name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.23", "1.24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.23'
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/tokenshim-linux-amd64 ./cmd/tokenshim

      - name: Build linux/arm64
        run: GOOS=linux GOARCH=arm64 go build -o dist/tokenshim-linux-arm64 ./cmd/tokenshim

      - name: Build darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/tokenshim-darwin-amd64 ./cmd/tokenshim

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/tokenshim-darwin-arm64 ./cmd/tokenshim

      - name: Build windows/amd64
        run: GOOS=windows GOARCH=amd64 go build -o dist/tokenshim-windows-amd64.exe ./cmd/tokenshim
